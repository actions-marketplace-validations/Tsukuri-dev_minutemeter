name: MinuteMeter (self)
# Dogfood: price MinuteMeter's own CI runs. On PRs this comments the per-job
# cost breakdown; on push it writes the job summary.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  actions: read
  pull-requests: write

jobs:
  cost:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          budget_usd: "0.50"
